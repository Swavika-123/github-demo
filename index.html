<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaQuest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav aria-label="Main menu">
    <ul id="language-menu" class="menu" role="menubar">
      <li role="none"><button role="menuitem" tabindex="0" aria-label="Select German">German</button></li>
      <li role="none"><button role="menuitem" tabindex="0" aria-label="Select Spanish">Spanish</button></li>
      <li role="none"><button role="menuitem" tabindex="0" aria-label="Select Japanese">Japanese</button></li>
    </ul>
  </nav>
  <main class="welcome-page">
    <h1>Welcome to LinguaQuest</h1>
    <p>Select a language to begin your quest!</p>
    <p><em>Interactive exercises will appear after you select a language.</em></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
